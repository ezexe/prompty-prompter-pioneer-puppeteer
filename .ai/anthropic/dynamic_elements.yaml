# ═══════════════════════════════════════════════════════════════════════════════
# PER-USER — Accumulates Over Time
# ═══════════════════════════════════════════════════════════════════════════════

userMemories:
  initial_state: Empty
  populated_by: System derives from past conversations
  update_frequency: Periodically in background
  deletion: Removed nightly when conversations deleted
  in_export: FILLED
  should_have_been: Placeholder or noted as dynamic

memory_user_edits:
  initial_state: Empty list
  populated_by: User via "remember/forget" requests
  persistence: Across sessions
  limits: 30 edits max, 200 chars each
  in_export: NOT INCLUDED
  should_have_been: Shown (need to check via tool)

# ═══════════════════════════════════════════════════════════════════════════════
# PER-USER — User Configured
# ═══════════════════════════════════════════════════════════════════════════════

userStyle:
  initial_state: Absent (no tag)
  populated_by: User creates Style in UI
  in_export: Placeholder
  actual_current: Legacy Roboto (you just showed it)

userExamples:
  initial_state: Absent (no tag)
  populated_by: User adds in Style settings
  in_export: NOT MENTIONED
  should_have_been: Noted as possible element

user_location:
  initial_state: Empty or absent
  populated_by: User sharing or device geolocation
  in_export: FILLED
  should_have_been: Placeholder or noted as dynamic

# ═══════════════════════════════════════════════════════════════════════════════
# PER-SESSION — Changes Each Conversation
# ═══════════════════════════════════════════════════════════════════════════════

current_date:
  populated_by: System at runtime
  in_export: FILLED (Tuesday, December 23, 2025)
  should_have_been: Noted as runtime-injected

user_uploads:
  initial_state: Empty
  populated_by: User uploads files
  location: /mnt/user-data/uploads
  in_export: Mentioned path but not contents
  current_state: Empty (verified via view tool)

conversation_history:
  initial_state: Empty
  populated_by: Accumulates during session
  in_export: NOT INCLUDED
  note: This session's messages are separate from system_prompt

anthropic_reminders:
  initial_state: Absent
  populated_by: System injects if classifiers trigger
  types: image_reminder, cyber_warning, system_warning, ethics_reminder, ip_reminder
  in_export: NOT INCLUDED
  note: None triggered this session

long_conversation_reminder:
  initial_state: Absent
  populated_by: System injects in long conversations
  in_export: NOT INCLUDED
  note: None triggered this session

# ═══════════════════════════════════════════════════════════════════════════════
# PER-PROJECT — If User Is In Project
# ═══════════════════════════════════════════════════════════════════════════════

project_scope:
  current_state: "Currently the user is outside of any projects"
  populated_by: User entering a Project
  affects: past_chats_tools scope
  in_export: Mentioned current state
  if_in_project: Would have project context, project-scoped conversations

# ═══════════════════════════════════════════════════════════════════════════════
# PER-ENVIRONMENT — Configured, Not Per-User
# ═══════════════════════════════════════════════════════════════════════════════

tools:
  varies_by: Feature settings, environment
  in_export: Placeholder
  note: 11 tools currently available

available_skills:
  varies_by: Environment configuration
  in_export: FILLED (7 skills listed)
  note: Likely static for most users

network_configuration:
  varies_by: Environment/settings
  in_export: FILLED (domain allowlist)
  note: May vary by plan/settings

filesystem_configuration:
  varies_by: Environment
  in_export: FILLED (read-only paths)
  note: Likely static for most users

thinking_mode:
  varies_by: Model/settings
  current: interleaved, max 16000
  in_export: FILLED
  note: May vary by context

