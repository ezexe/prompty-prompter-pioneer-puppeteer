<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Q — Research Tree</title>
  <style>body { margin: 0; }</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    fetch('./Q.jsx')
      .then(r => r.text())
      .then(src => {
        // Swap ES module import for UMD global destructuring
        src = src.replace(
          /^import\s*\{([^}]+)\}\s*from\s*["']react["'];?\s*$/m,
          'const {$1} = React;'
        );
        // Swap export default for global assignment
        src = src.replace(/^export\s+default\s+/m, 'window.__App = ');

        const { code } = Babel.transform(src, {
          presets: ['react'],
          filename: 'Q.jsx'
        });

        const script = document.createElement('script');
        script.textContent = code;
        document.body.appendChild(script);

        ReactDOM.createRoot(document.getElementById('root'))
          .render(React.createElement(window.__App));
      })
      .catch(err => {
        document.getElementById('root').innerText = err.message;
        console.error(err);
      });
  </script>
</body>
</html>
