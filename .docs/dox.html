<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>φ — Index</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0d1117; color: #c9d1d9; }
    #nav { padding: 1rem 2rem; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    #nav h1 { margin: 0; font-size: 1.2rem; color: #58a6ff; }
    #nav a {
      padding: 0.4rem 0.8rem; border-radius: 6px; text-decoration: none;
      color: #c9d1d9; background: #161b22; border: 1px solid #30363d;
      font-size: 0.9rem; transition: background 0.15s;
    }
    #nav a:hover, #nav a.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
    #nav a.error { opacity: 0.3; pointer-events: none; }
    #root { padding: 1rem 2rem; }
    #root.empty { color: #8b949e; font-style: italic; padding: 3rem 2rem; }
  </style>
</head>
<body>
  <div id="nav"><h1>φ</h1></div>
  <div id="root" class="empty">Select a component above</div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    const jsxFiles = ['Q.jsx', 'phi.jsx', 'fib.jsx', 'matrix.jsx', 'bin.jsx'].map(f => 'phi/' + f);
    const nav = document.getElementById('nav');
    const root = document.getElementById('root');
    let reactRoot = null;

    // Probe each file and build nav links
    jsxFiles.forEach(file => {
      const link = document.createElement('a');
      link.href = '#' + file;
      link.textContent = file.split('/').pop().replace('.jsx', '');
      nav.appendChild(link);
    });

    function loadComponent(file) {
      document.querySelectorAll('#nav a').forEach(a => a.classList.toggle('active', a.hash === '#' + file));
      root.className = '';
      root.textContent = 'Loading…';

      fetch('./' + file)
        .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.text(); })
        .then(src => {
          src = src.replace(
            /^import\s*\{([^}]+)\}\s*from\s*["']react["'];?\s*$/m,
            'const {$1} = React;'
          );
          src = src.replace(/^export\s+default\s+/m, 'window.__App = ');

          const { code } = Babel.transform(src, { presets: ['react'], filename: file });

          const tag = document.createElement('script');
          tag.textContent = code;
          document.body.appendChild(tag);

          root.textContent = '';
          if (reactRoot) reactRoot.unmount();
          reactRoot = ReactDOM.createRoot(root);
          reactRoot.render(React.createElement(window.__App));
        })
        .catch(err => {
          root.textContent = err.message;
          console.error(err);
        });
    }

    // Handle hash navigation
    window.addEventListener('hashchange', () => {
      const file = location.hash.slice(1);
      if (file) loadComponent(file);
      window.location.reload(); // Force reload to reset state when navigating back to index
    });

    // Load from hash on page load
    if (location.hash.length > 1) {
      loadComponent(location.hash.slice(1));
    }
  </script>
</body>
</html>
