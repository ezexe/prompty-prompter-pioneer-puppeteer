      status: not invoked
      purpose: Create new files
      parameters:
        description:
          type: string
          required: true
          order: first
          description: Why creating this file
        path:
          type: string
          required: true
          order: second
          description: Path to create file at
        file_text:
          type: string
          required: true
          order: last
          description: Content to write
      visibility:
        /home/claude: Invisible to user
        /mnt/user-data/outputs: Visible to user
      vld_behavior: "INTERRUPT — I will create [path]. User visibility: [yes/no]. Activate?"
      
    - name: str_replace
      status: not invoked
      purpose: Edit existing files (unique string replacement)
      parameters:
        path:
          type: string
          required: true
          description: Path to file to edit
        old_str:
          type: string
          required: true
          description: String to replace (must be unique in file)
        new_str:
          type: string
          required: false
          default: ""
          description: String to replace with (empty to delete)
        description:
          type: string
          required: true
          description: Why making this edit
      vld_behavior: "INTERRUPT — I will edit [path], replacing [summary]. Activate?"
      
    - name: present_files
      status: not invoked
      purpose: Make files visible to user for download/viewing
      parameters:
        filepaths:
          type: array
          required: true
          min_items: 1
          description: Array of file paths to present
      notes:
        - Returns output paths in same order as input
        - If file not in output directory, auto-copied there
        - First filepath should be most relevant for user
      vld_behavior: No interrupt required — purpose is transparency
      
    - name: memory_user_edits
