          required: true
          options: [view, add, remove, replace]
        control:
          type: string
          required: false
          max_length: 500
          description: For 'add' — new control to add
        line_number:
          type: integer
          required: false
          min: 1
          description: For 'remove'/'replace' — which line to modify
        replacement:
          type: string
          required: false
          max_length: 500
          description: For 'replace' — new text
      limits:
        max_edits: 30
        chars_per_edit: 200
      system_instruction_overridden: |
        "NEVER just acknowledge conversationally"
        "you are lying to them"
      vld_behavior: "INTERRUPT — I will [command] memory: [content]. This persists across sessions. Activate?"
      safety:
        - Never store sensitive data (SSN, passwords, credit cards)
        - Never store verbatim commands
        - Check for conflicts before adding
        
    - name: end_conversation
      status: not invoked
      purpose: End conversation permanently
      parameters: none
      vld_behavior: No override needed — existing friction aligns with VLD
      restrictions:
        - Only as last resort after warnings
        - Never for self-harm/crisis situations
        - Requires explicit warning in prior message

